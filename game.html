<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikasa Clickker</title>
    <link rel="stylesheet" href="game-style.css">
    <link rel="icon" href="Asset/windah.png">

    <!-- preload script -->
    <link rel="modulepreload" href="./story-mode.js" fetchpriority="low">
    <link rel="modulepreload" href="./timer-mode.js" fetchpriority="low">
    <link rel="modulepreload" href="./logic-tampilan-game.js" fetchpriority="high">

    <!-- asset -->
     <link rel="preload" fetchpriority="high" href="game-style.css" as="style">
     <link rel="preload" fetchpriority="high" href="Asset/windah.png" as="image">
     <link rel="preload" fetchpriority="high" href="Asset/portal larry1.png" as="image">
     <link rel="preload" fetchpriority="high" href="PixelifySans-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
</head>

<body class="smooth">
    <div class="container">
        <!-- trail -->
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>
        <div class="trail hilang"></div>

        <!-- hamburger menu -->
        <button class="hamburger hilang smooth">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- pause -->
        <div class="pause hilang smooth">
            <span></span>
            <span></span>
        </div>

        <!-- pause menu -->
        <div class="pause-menu hilang">
            <h1 id="pause-h1">Pause</h1>
            <div class="container-pause-el">
                <div class="home">
                    <img src="Asset/home1.png" fetchpriority="low">
                </div>
                <div class="play">
                    <img src="Asset/play1.png" fetchpriority="low">
                </div>
                <div class="retry">
                    <img src="Asset/retry1.png" fetchpriority="low">
                </div>
            </div>
        </div>

        <!-- pause wall -->
        <div class="pause-wall hilang"></div>

        <!-- text -->
        <div class="text hilang smooth">
            <div class="logo">
                <a href="index.html"><img src="Asset/Mikasa Clickker.png"></a>
            </div>
            <p id="hitung">Tekan karakter untuk memulai...</p>
        </div>

        <!-- portal -->
        <div class="portal">
            <img src="Asset/portal larry1.png" id="portal">
        </div>

        <!-- windah-animasi -->
        <div class="windah-animasi">
            <img src="Asset/windah.png">
        </div>

        <!-- bar -->
        <div class="bar hilang smooth">
            <img src="Asset/bar outline.png" id="bar-outline" fetchpriority="low">

            <h4 class="bar-status">0%</h4>

            <img class="bar-inner hilang smooth" src="Asset/bar innner.png" fetchpriority="low">
        </div>

        <div class="bar-shadow hilang smooth"></div>

        <!-- bar kecil -->
        <div class="bar-kecil hilang smooth">
            <img src="Asset/bar outline ver.kecil.png" id="bar-outline-kecil" fetchpriority="low">

            <h4 class="bar-status-kecil">0%</h4>

            <img class="bar-inner-kecil hilang smooth" src="Asset/bar innner ver.kecil.png" fetchpriority="low">
        </div>

        <div class="bar-shadow-kecil hilang smooth"></div>

        <!-- mode -->
        <div class="mode hilang smooth">
            <button class="btn-mode1 aktif1" id="btn-mode1" type="button">Story Mode</button>
            <button class="btn-mode2 pasif" id="btn-mode2" type="button">Timer Mode</button>
        </div>

        <!-- game -->
        <section class="game hilang smooth">
            <!-- leaderboard -->
            <div class="leaderboard">
                <h1>leaderboard</h1>
                <div class="container-isi">
                    <div class="isi-leaderboard" id="awal">
                        <h4>1</h4>
                        <h4>zaxon</h4>
                        <h4>999</h4>
                    </div>
                    <div class="isi-leaderboard">
                        <h4>1</h4>
                        <h4>zaxon</h4>
                        <h4>999</h4>
                    </div>
                    <div class="isi-leaderboard">
                        <h4>1</h4>
                        <h4>zaxon</h4>
                        <h4>999</h4>
                    </div>
                    <div class="isi-leaderboard">
                        <h4>1</h4>
                        <h4>zaxon</h4>
                        <h4>999</h4>
                    </div>
                    <div class="isi-leaderboard">
                        <h4>1</h4>
                        <h4>zaxon</h4>
                        <h4>999</h4>
                    </div>

                    <div class="isi-leaderboard" id="akhir">
                        <h4>1</h4>
                        <h4>zaxon</h4>
                        <h4>999</h4>
                    </div>
                </div>
            </div>

            <!-- windah -->
            <div class="windah">
                <img src="Asset/windah.png">
            </div>

            <!-- trail windah -->
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
            <div class="trail-windah hilang"><img src="Asset/windah.png"></div>
    </div>

    <p id="timer">Time: <br>01:00</p>
    </section>

    <!-- live -->
    <div class="live hilang smooth">
        <div class="live-dot"></div>
        <p id="live-text">Dimension: Stable</p>
    </div>

    <!-- Logic -->
    <script src="trail.js" type="module" fetchpriority="low"></script>
    <script src="logic-tampilan-game.js" type="module"></script>
</body>

</html>
