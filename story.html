<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa Clickker</title>
    <link rel="stylesheet" href="story.css">
    <link rel="icon" href="Asset/Mikasa Clikkergame.png">
</head>

<body>
    <!-- mulai -->
    <div class="mulai">
        <h1>Klik untuk mulai...</h1>
        <p>Use a PC for the best experience</p>
    </div>

    <!-- scene awal -->
    <div class="scene-awal">
        <h1 class="ketik"></h1>
        <a href="game.html" id="button"><button>PLAY NOW</button></a>
    </div>

    <!-- container -->
    <div class="container">
        <!-- tempat asset animasi -->
        <div class="show">
            <!-- ledakan -->
            <div class="cara hilang" id="ledakan">
                <img src="Asset/ledakan 1.png">
            </div>

            <!-- fog -->
            <div class="cara hilang" id="fog">
                <img src="Asset/fog 1.png">
            </div>

            <!-- larry -->
            <div class="cara pasif hilang" id="larry">
                <img src="Asset/larry.png">
            </div>

            <!-- Lingkaran Sihir -->
            <div class="cara hilang" id="sihir">
                <img src="Asset/sihir1.png">
            </div>

            <!-- j2prime -->
            <div class="cara hilang" id="j2prime">
                <img src="Asset/j2 prime.png">
            </div>

            <!-- windah -->
            <div class="cara pasif hilang" id="windah">
                <img src="Asset/Mikasa Story.png">
            </div>

            <!-- portal larry -->
            <div class="cara hilang" id="portal-larry">
                <img src="Asset/portal larry1.png">
            </div>
        </div>
    </div>

    <!-- dialog dan nama -->
    <div class="container-dialog">
        <!-- nama -->
        <div class="nama"></div>

        <!-- dialog -->
        <p class="teks"></p>
        </p>

        <!-- next -->
        <p class="next">Next =></p>
    </div>
    </div>

    <script src="story.js"></script>
</body>

</html>
